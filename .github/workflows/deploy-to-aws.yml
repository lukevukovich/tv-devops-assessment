name: Deploy to AWS

on:
  push:
    branches:
      - dev
      - main
    workflow_dispatch:
      inputs:
        environment:
          description: "Environment to deploy"
          required: true
          default: "dev"
          type: choice
          options:
            - dev
            - prod

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      ECR_REPOSITORY_NAME: ${{ vars.ECR_REPOSITORY_NAME }}
      TERRAFORM_STATE_BUCKET: ${{ vars.TERRAFORM_STATE_BUCKET }}
      TERRAFORM_LOCK_TABLE: ${{ vars.TERRAFORM_LOCK_TABLE }}
      CONTAINER_PORT: ${{ vars.CONTAINER_PORT }}
      DESIRED_COUNT: ${{ vars.DESIRED_COUNT }}
      CPU: ${{ vars.CPU }}
      MEMORY: ${{ vars.MEMORY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Get AWS account ID
        id: aws-account
        run: |
          echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Install CDKTF dependencies
        working-directory: ./iac
        run: npm ci

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Generate CDKTF providers
        working-directory: ./iac
        run: npx cdktf-cli get

      - name: Deploy infrastructure before image push
        working-directory: ./iac
        run: npx cdktf-cli deploy --auto-approve

      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin \
            "${{ steps.aws-account.outputs.account_id }}.dkr.ecr.${AWS_REGION}.amazonaws.com"

      - name: Build Docker image
        working-directory: ./app
        run: |
          docker build -t "$ECR_REPOSITORY_NAME:latest" .

      - name: Tag Docker image for ECR
        run: |
          docker tag "$ECR_REPOSITORY_NAME:latest" \
            "${{ steps.aws-account.outputs.account_id }}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY_NAME}:latest"

      - name: Push Docker image to ECR
        run: |
          docker push "${{ steps.aws-account.outputs.account_id }}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY_NAME}:latest"

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster "$PROJECT_NAME-cluster" \
            --service "$PROJECT_NAME-service" \
            --force-new-deployment

      - name: Redeploy infrastructure after image push
        working-directory: ./iac
        run: npx cdktf-cli deploy --auto-approve